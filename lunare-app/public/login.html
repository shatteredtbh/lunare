<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign in — Lunare</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/shared.css"/>
<style>
.login-page{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:4rem 2rem;border-bottom:1px solid var(--sand);}
.login-box{width:100%;max-width:400px;background:var(--cream);border:1px solid var(--sand);padding:3rem 2.5rem;}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:20px;letter-spacing:0.25em;color:var(--night);margin-bottom:0.4rem;}
.login-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;color:var(--night);margin-bottom:0.5rem;}
.login-title em{font-style:italic;color:var(--dusk);}
.login-sub{font-size:13px;color:var(--accent);margin-bottom:2rem;}
.form-field{margin-bottom:1.2rem;}
.form-field label{display:block;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
.form-field input{width:100%;padding:11px 14px;border:1px solid var(--sand);background:var(--moon);font-family:'Lato',sans-serif;font-size:14px;font-weight:300;color:var(--night);outline:none;transition:border-color 0.2s;}
.form-field input:focus{border-color:var(--dusk);}
.form-field input.error{border-color:#c0392b;}
.error-msg{font-size:12px;color:#c0392b;margin-bottom:1rem;min-height:18px;}
.login-btn{width:100%;padding:13px;background:var(--night);color:var(--cream);border:none;font-family:'Lato',sans-serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;margin-top:0.5rem;}
.login-btn:hover{background:var(--dusk);}
.login-btn:disabled{opacity:0.6;cursor:not-allowed;}
</style>
</head>
<body>
<div id="nav-container"></div>
<div class="login-page">
  <div class="login-box">
    <p class="login-logo">LUNARE</p>
    <h1 class="login-title">Welcome <em>back.</em></h1>
    <p class="login-sub">Sign in to your account.</p>
    <div class="error-msg" id="login-error"></div>
    <div class="form-field"><label>Email / username</label><input type="text" id="f-user" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="form-field"><label>Password</label><input type="password" id="f-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign in</button>
  </div>
</div>
<div id="footer-container"></div>
<div class="toast" id="toast"></div>
<script src="/shared.js"></script>
<script>
document.getElementById('nav-container').innerHTML=navHTML('');
document.getElementById('footer-container').innerHTML=footerHTML();
initNav();
async function doLogin(){
  const username=document.getElementById('f-user').value.trim();
  const password=document.getElementById('f-pass').value;
  const errEl=document.getElementById('login-error');
  errEl.textContent='';
  if(!username){errEl.textContent='Please enter your email.';document.getElementById('f-user').classList.add('error');return;}
  if(!password){errEl.textContent='Please enter your password.';document.getElementById('f-pass').classList.add('error');return;}
  const btn=document.getElementById('login-btn');
  btn.disabled=true;btn.textContent='Signing in…';
  try{
    const user=await api('POST','/api/login',{username,password});
    showToast('Welcome back, '+user.name.split(' ')[0]+'!');
    setTimeout(()=>window.location.href=user.isAdmin?'/admin':'/',800);
  }catch(e){
    errEl.textContent=e.message;
    btn.disabled=false;btn.textContent='Sign in';
  }
}
</script>
</body>
</html>
